name: SonaApp
options:
  bundleIdPrefix: ai.sona
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
packages:
  GLTFKit2:
    url: https://github.com/warrenm/GLTFKit2
    from: "0.5.9"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"
targets:
  SonaApp:
    type: application
    platform: iOS
    sources:
      - Sources
    dependencies:
      - package: GLTFKit2
        product: GLTFKit2
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.sona.app
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Sona listens when you speak to her."
        INFOPLIST_KEY_NSCameraUsageDescription: "Sona can see what you show her."
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
